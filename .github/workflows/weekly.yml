name: 每週一自動產出追加建議

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: pip install pandas openpyxl xlsxwriter
      - run: python generate.py
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html output.xlsx
          git diff --staged --quiet || git commit -m "自動更新：$(date '+%Y-%m-%d')"
          git push
